<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="popup.css"></head>
<body>
<header><div class="logo"><span class="dot"></span>HuePick</div></header>
<div class="row">
  <input id="hexin" placeholder="#5b7cfa" maxlength="7" autocomplete="off" spellcheck="false">
  <button id="add">Add</button>
  <button id="pick" class="primary">Pick</button>
</div>
<section id="current" hidden>
  <div id="swatch"></div>
  <div class="codes">
    <button class="code" data-c="hex">HEX</button>
    <button class="code" data-c="rgb">RGB</button>
    <button class="code" data-c="hsl">HSL</button>
  </div>
  <div id="contrast"></div>
</section>
<h2>Palette <button id="clear" title="Clear all">clear</button></h2>
<ul id="palette"></ul>
<footer><button id="export">Export JSON</button><span id="toast"></span></footer>
<script src="popup.js"></script>
</body></html>
